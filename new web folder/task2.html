<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSS Boxes Experiment</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="container">
    <h1>CSS Boxes Experiment</h1>

    <div class="box box1">
      <h2>Box 1</h2>
      <p>This box has a small margin, moderate padding, and a solid border.</p>
    </div>

    <div class="box box2">
      <h2>Box 2</h2>
      <p>This box has larger vertical margin, more padding and a dashed border.</p>
    </div>

    <div class="box box3">
      <h2>Box 3</h2>
      <p>This box uses horizontal margin, small padding and a double border.</p>
    </div>
  </main>
</body>
</html>
